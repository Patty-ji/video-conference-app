<!DOCTYPE html>
<html>
<head>
<title>Meeting Room</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h2>Meeting Room</h2>

<div id="meetingTimer">00:00</div>

<div id="video-grid"></div>

<!-- Controls -->
<div class="controls">

<button onclick="toggleMic()">Mic</button>
<button onclick="toggleCamera()">Camera</button>
<button onclick="shareScreen()">Screen</button>

<button onclick="raiseHand()">✋ Raise Hand</button>

<button onclick="sendReaction('👍')">👍</button>
<button onclick="sendReaction('😂')">😂</button>
<button onclick="sendReaction('👏')">👏</button>

<button onclick="startRecording()">Start Rec</button>
<button onclick="stopRecording()">Stop Rec</button>

</div>

<!-- Participants -->
<div class="participants">
<h3>Participants</h3>
<ul id="participantsList"></ul>
</div>

<!-- Chat -->
<div class="chat">

<input id="chat_message">
<button onclick="sendMessage()">Send</button>

<ul id="messages"></ul>

</div>

<!-- File Share -->
<div>

<input type="file" id="fileInput">
<button onclick="sendFile()">Send File</button>

</div>
<script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="js/app.js"></script>

</body>
</html>
